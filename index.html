<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #060f08;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
  }

  .page {
    min-height: 600px;
    background: #0a1a0e;
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
    width: 560px;
  }

  .corner { position: absolute; width: 60px; height: 60px; }
  .corner.tl { top: 16px; left: 16px; border-top: 2px solid #3B6D11; border-left: 2px solid #3B6D11; border-radius: 4px 0 0 0; }
  .corner.tr { top: 16px; right: 16px; border-top: 2px solid #3B6D11; border-right: 2px solid #3B6D11; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 16px; left: 16px; border-bottom: 2px solid #3B6D11; border-left: 2px solid #3B6D11; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 16px; right: 16px; border-bottom: 2px solid #3B6D11; border-right: 2px solid #3B6D11; border-radius: 0 0 4px 0; }

  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #1d9e7520 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .header-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .h-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #3B6D11); }
  .h-line.r { background: linear-gradient(to left, transparent, #3B6D11); }

  .h-diamond {
    width: 8px; height: 8px;
    background: #639922;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .frame-wrapper { position: relative; z-index: 1; cursor: pointer; }

  .frame-outer {
    padding: 4px;
    background: linear-gradient(135deg, #1d9e75, #3B6D11, #97C459, #1d9e75);
    border-radius: 8px;
  }

  .frame-inner {
    background: #0a1a0e;
    padding: 8px;
    border-radius: 6px;
  }

  .scan-line-wrap {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
  }

  .scan-lines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.12) 3px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 2;
    border-radius: 4px;
  }

  #preview-img {
    display: block;
    max-width: 420px;
    max-height: 360px;
    width: 100%;
    height: auto;
    border-radius: 4px;
    object-fit: contain;
    filter: saturate(1.1) contrast(1.05);
  }

  .placeholder-box {
    width: 420px;
    height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #111f14;
    border-radius: 4px;
    border: 1.5px dashed #3B6D11;
    transition: border-color 0.2s;
  }

  .placeholder-box:hover { border-color: #639922; }

  .upload-icon {
    width: 48px; height: 48px;
    border: 2px solid #3B6D11;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .upload-arrow {
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 12px solid #639922;
  }

  .upload-label {
    font-size: 13px;
    color: #639922;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hud-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .hud-seg { display: flex; align-items: center; gap: 6px; }

  .hud-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #639922;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .hud-text {
    font-size: 11px;
    color: #3B6D11;
    letter-spacing: 0.12em;
  }

  .hud-spacer { flex: 1; height: 1px; background: #1d3d1a; }

  .footer-ornament {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .orb { width: 6px; height: 6px; border-radius: 50%; background: #3B6D11; }
  .orb.active { background: #97C459; animation: pulse 2.4s infinite; }

  #file-input { display: none; }
</style>
</head>
<body>

<div class="page">
  <div class="dot-grid"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="header-bar">
    <div class="h-line"></div>
    <div class="h-diamond"></div>
    <div class="h-line r"></div>
  </div>

  <div class="frame-wrapper" onclick="document.getElementById('file-input').click()">
    <div class="frame-outer">
      <div class="frame-inner">
        <div class="scan-line-wrap">
          <div class="scan-lines"></div>
          <div class="placeholder-box" id="placeholder">
            <div class="upload-icon"><div class="upload-arrow"></div></div>
            <span class="upload-label">click to load image</span>
          </div>
          <img id="preview-img" style="display:none;" alt="uploaded image" />
        </div>
      </div>
    </div>
  </div>

  <div class="hud-bar">
    <div class="hud-seg">
      <div class="hud-dot"></div>
      <span class="hud-text" id="status-text">READY</span>
    </div>
    <div class="hud-spacer"></div>
    <div class="hud-seg">
      <span class="hud-text" id="dim-text">--</span>
    </div>
  </div>

  <div class="footer-ornament">
    <div class="orb"></div>
    <div class="orb active"></div>
    <div class="orb"></div>
  </div>

  <input type="file" id="file-input" accept="image/*" />
</div>

<script>
  const input = document.getElementById('file-input');
  const img = document.getElementById('preview-img');
  const placeholder = document.getElementById('placeholder');
  const statusText = document.getElementById('status-text');
  const dimText = document.getElementById('dim-text');

  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    img.src = url;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    statusText.textContent = 'LOADED';
    img.onload = () => {
      dimText.textContent = img.naturalWidth + ' x ' + img.naturalHeight;
    };
  });
</script>

</body>
</html>
